name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: -Dorg.gradle.configuration-cache=false

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup JDK 17 + Gradle cache (after Android setup)
        id: setup_java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Verify active Java version
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Force Java 17 for Gradle invocations
        run: |
          if [[ -n "${{ steps.setup_java.outputs.path }}" ]]; then
            echo "JAVA_HOME=${{ steps.setup_java.outputs.path }}" >> "$GITHUB_ENV"
            echo "${{ steps.setup_java.outputs.path }}/bin" >> "$GITHUB_PATH"
          elif [[ -n "${JAVA_HOME_17_X64:-}" ]]; then
            echo "JAVA_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"
            echo "$JAVA_HOME_17_X64/bin" >> "$GITHUB_PATH"
          fi
          echo "setup-java path output: ${{ steps.setup_java.outputs.path }}"
          echo "Effective JAVA_HOME after override: ${JAVA_HOME_17_X64:-$JAVA_HOME}"
          java -version

      - name: Run stable build pipeline
        run: bash ./.github/scripts/ci-build.sh

      - name: Detect report/artifact files
        id: detect
        if: always()
        run: |
          shopt -s nullglob globstar
          junit=(build/test-results/test/*.xml build/test-results/testDebugUnitTest/*.xml)
          artifacts=(**/build/outputs/**/*.apk build/distributions/*.zip)
          if (( ${#junit[@]} > 0 )); then
            echo "has_junit=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_junit=false" >> "$GITHUB_OUTPUT"
          fi
          if (( ${#artifacts[@]} > 0 )); then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload JUnit reports
        if: always() && steps.detect.outputs.has_junit == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: junit-reports
          path: |
            build/test-results/test/*.xml
            build/reports/tests/test/**
            build/test-results/testDebugUnitTest/*.xml
            build/reports/tests/testDebugUnitTest/**

      - name: Upload build artifacts
        if: always() && steps.detect.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: build-artifacts
          path: |
            **/build/outputs/**/*.apk
            build/distributions/*.zip
