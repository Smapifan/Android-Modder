name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21 + Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Ensure Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests (Android/JVM auto-detect)
        run: |
          if ./gradlew --no-daemon tasks --all | grep -q "testDebugUnitTest"; then
            ./gradlew --no-daemon --stacktrace testDebugUnitTest
          else
            ./gradlew --no-daemon --stacktrace test
          fi

      - name: Build artifacts (APK preferred)
        run: |
          if ./gradlew --no-daemon tasks --all | grep -q "assembleDebug"; then
            ./gradlew --no-daemon --stacktrace assembleDebug
          elif ./gradlew --no-daemon tasks --all | grep -q "assembleRelease"; then
            ./gradlew --no-daemon --stacktrace assembleRelease
          else
            ./gradlew --no-daemon --stacktrace distZip
          fi

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          if-no-files-found: warn
          path: |
            build/test-results/test/*.xml
            build/reports/tests/test/**
            build/test-results/testDebugUnitTest/*.xml
            build/reports/tests/testDebugUnitTest/**

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          if-no-files-found: warn
          path: |
            **/build/outputs/**/*.apk
            build/distributions/*.zip
